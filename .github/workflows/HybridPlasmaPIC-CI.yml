name: HybridPlasmaPIC CI

# Test workflow for the HybridPlasmaPIC package.
#
# Ubuntu-only by design: this is a PRIVATE repo on the GitHub free tier
# (2000 Actions-minutes/month), where macOS bills at 10x and Windows at 2x.
# A multi-OS matrix exhausts the monthly minutes and then ALL jobs (every OS,
# and the Documentation workflow too) fail at dispatch with no runner assigned.
# Keeping CI to cheap 1x ubuntu runners stays within the free tier. Re-enable
# macOS/Windows (and a scheduled run) only on a paid plan or a public repo
# (public repos get unlimited Actions minutes).

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia 1.12 (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'   # the development version; see julia compat in Project.toml
      - uses: julia-actions/cache@v2
      - name: Instantiate and test
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.test(; coverage = true)' 2>&1 | tee test-log.txt
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test-log.txt
          if-no-files-found: warn
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  mpi-smoke:
    name: Real MPI smoke (${{ matrix.ranks }}-rank)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ranks: [2, 4, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Run real MPI regression smoke test
        timeout-minutes: 20
        env:
          MPI_RANKS: ${{ matrix.ranks }}
        run: |
          set -euo pipefail
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            import MPI
            mpiexec = MPI.mpiexec()
            mpiexec === nothing && error("MPI launcher unavailable")
            n = parse(Int, get(ENV, "MPI_RANKS", "2"))
            n in (2, 4, 8) || error("Unsupported MPI rank matrix size: $n")
            cmd = `$mpiexec -n $n $(Base.julia_cmd()) --project=$(pwd()) test/test_mpi_multirank.jl`
            @info "running MPI smoke" ranks=n cmd=string(cmd)
            run(cmd)' > mpi-smoke.log 2>&1
          cat mpi-smoke.log
      - name: Upload mpi-smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mpi-smoke-log-${{ matrix.ranks }}-ranks
          path: mpi-smoke.log
          if-no-files-found: warn

  format:
    name: Formatting check (JuliaFormatter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Check formatting
        run: |
          julia -e '
            using Pkg
            Pkg.add(PackageSpec(name = "JuliaFormatter", version = "1"))
            using JuliaFormatter
            if !format(".")
                error("HybridPlasmaPIC is not formatted; run JuliaFormatter.format on the package")
            end'
